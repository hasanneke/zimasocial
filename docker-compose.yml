# Use postgres/example user/password credentials
version: '3.9'

services:
  postgres:
    image: postgres
    restart: always
    ports:
      - "5432:5432"
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: example
      POSTGRES_USER: zimaadmin
      POSTGRES_DB: zimasocial
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:

